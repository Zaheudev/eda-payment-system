spring.application.name=demo-bff
server.port=8090

spring.kafka.bootstrap-servers=localhost:29092
spring.kafka.consumer.group-id=demo-bff-${random.uuid}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.properties.schema.registry.url=http://localhost:8082

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.properties.specific.avro.reader=false

spring.kafka.listener.ack-mode=record
spring.kafka.listener.missing-topics-fatal=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

docker.socket.path=/var/run/docker.sock
toxiproxy.host=localhost
toxiproxy.port=8474
