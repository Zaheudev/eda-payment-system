gatling {
  core {
    shutdownTimeout = 20000
  }
  data {
    writers = [console, file]
  }
  charting {
    indicators {
      lowerBound = 50
      higherBound = 5000
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }
  http {
    requestTimeout = 30000
  }
}
