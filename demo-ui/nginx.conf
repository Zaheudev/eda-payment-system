server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/v1/ {
        proxy_pass http://payment-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/bff/ {
        rewrite ^/api/bff/(.*) /api/$1 break;
        proxy_pass http://demo-bff:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }
}
